<!DOCTYPE html>
<html>
<body>

<input type="text" id="task">

<button onclick="addTask()">Add</button>

<ul id="list"></ul>

<script>
function addTask() {
    const task = document.getElementById("task").value;

    const li = document.createElement("li");
    li.innerHTML = task;

    document.getElementById("list").appendChild(li);
}
</script>

</body>
</html>
